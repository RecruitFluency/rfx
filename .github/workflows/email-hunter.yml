name: Email Hunter

# Fills in missing coach emails from public program pages, as proposals a
# human approves in the app. Runs nightly, and can be triggered by hand.
on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC nightly
  workflow_dispatch:
    inputs:
      limit:
        description: 'How many coaches to hunt this run'
        required: false
        default: '300'

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run the Email Hunter
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          HUNT_LIMIT: ${{ github.event.inputs.limit || '300' }}
        run: node scripts/email-hunter.mjs
