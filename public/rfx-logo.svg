<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Official RFX mark: red circle with white play-P cutouts (vector trace of the brand logo) -->
  <defs>
    <clipPath id="rfx-circle">
      <circle cx="250" cy="250" r="155"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rfx-circle)">
    <!-- top segment -->
    <polygon points="80,-20 410,-20 410,209 80,70" fill="#FF0000"/>
    <!-- left crescent -->
    <polygon points="90,110 163,110 190,390 90,390" fill="#FF0000"/>
    <!-- bottom-right segment -->
    <polygon points="230,349 410,248 410,420 230,420" fill="#FF0000"/>
  </g>
  <!-- center play triangle -->
  <polygon points="233,210 303,248 233,286" fill="#FF0000"/>
</svg>
